<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicFlow — Appointment & Intake System</title>
  <meta name="description" content="ClinicFlow: A modern clinic appointment booking and AI-assisted intake management system for patients and front-desk staff." />
  <meta name="theme-color" content="#6366f1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Splash / Loading Overlay ──────────────────────────────────── -->
  <div id="splash" class="splash" aria-label="Loading ClinicFlow" role="status">
    <div class="splash-logo">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="14" fill="url(#splashGrad)"/>
        <path d="M22 10v24M10 22h24" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="splashGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <span>ClinicFlow</span>
    </div>
    <div class="splash-spinner"><div></div><div></div><div></div></div>
  </div>

  <!-- ─── App Shell ─────────────────────────────────────────────────── -->
  <div id="app-shell" class="app-shell" hidden>

    <!-- Mobile Header Bar -->
    <div class="mobile-header" id="mobile-header">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="mobile-brand">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#mBrand)"/>
          <path d="M14 6v16M6 14h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="mBrand" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        ClinicFlow
      </div>
      <button class="theme-toggle-btn" id="mobile-theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- Sidebar Backdrop (Mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- ─── Sidebar ──────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <rect width="30" height="30" rx="9" fill="url(#brandGrad)"/>
            <path d="M15 7v16M7 15h16" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">ClinicFlow</span>
        <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close navigation">✕</button>
      </div>

      <nav class="sidebar-nav" role="menubar">
        <div class="nav-section-label">Staff Portal</div>

        <a href="#" class="nav-item active" data-view="dashboard" id="nav-dashboard" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span>Dashboard</span>
        </a>

        <a href="#" class="nav-item" data-view="appointments" id="nav-appointments" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Appointments</span>
        </a>

        <a href="#" class="nav-item" data-view="intakes" id="nav-intakes" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Intake Forms</span>
        </a>

        <a href="#" class="nav-item" data-view="followups" id="nav-followups" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Follow-ups</span>
          <span class="nav-badge" id="followup-badge">0</span>
        </a>

        <a href="#" class="nav-item" data-view="patients" id="nav-patients" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Patients</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">Patient Portal</div>

        <a href="#" class="nav-item nav-item-accent" data-view="book" id="nav-book" role="menuitem">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span>Book Appointment</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-api" id="sidebar-api-dot">
          <span class="api-dot"></span>
          <span class="api-label">Connecting…</span>
        </div>
        <div class="ai-disclaimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          AI summaries are administrative drafts only — not medical advice.
        </div>
      </div>
    </aside>

    <!-- ─── Main Content ─────────────────────────────────────────────── -->
    <main class="main-content" id="main-content">

      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <div class="page-meta">
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <span id="breadcrumb">Overview</span>
            </nav>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-status" id="api-status">
            <span class="status-dot"></span>
            <span class="status-text">Connecting…</span>
          </div>
          <div class="topbar-time" id="topbar-time" aria-live="polite"></div>
          <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle light/dark theme">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </header>

      <!-- View Container -->
      <div class="view-container" id="view-container" role="main">
        <div class="view-loading" id="initial-loader" aria-label="Loading">
          <div class="dot-loader"><span></span><span></span><span></span></div>
        </div>
      </div>
    </main>
  </div>

  <!-- ─── Toast Container ───────────────────────────────────────────── -->
  <div class="toast-container" id="toast-container" role="alert" aria-live="polite"></div>

  <!-- ─── Modal ─────────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Details</h3>
        <button class="modal-close" id="modal-close" onclick="closeModal()" aria-label="Close dialog">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
